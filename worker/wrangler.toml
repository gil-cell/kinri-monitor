name = "kinri-monitor-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "CACHE"
id = "b68feb2d53904decb0787baedbfca02f"

# Cron: 日本時間 9:05 (UTC 0:05) と 15:05 (UTC 6:05) に金利チェック
[triggers]
crons = ["5 0 * * *", "5 6 * * *"]

# APNs設定（秘密鍵以外。秘密鍵はwrangler secretで設定）
[vars]
APNS_KEY_ID = "54YGBXP475"
APNS_TEAM_ID = "KC6T5VZ2X3"
APNS_BUNDLE_ID = "com.kinrimonitor.app"
APNS_PRODUCTION = "true"
